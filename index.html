<!DOCTYPE html>
<html lang="ko">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(165deg, #0B1D3A 0%, #142850 40%, #1B3A5C 100%);
    color: #E8ECF1;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .grid-overlay {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrapper {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto; padding: 20px 16px;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .fade-in { animation: fadeUp 0.28s ease forwards; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px; padding: 24px 20px; margin-bottom: 16px;
    box-shadow: 0 10px 36px rgba(0,0,0,0.12);
  }
  .btn {
    width: 100%; padding: 16px 24px;
    background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
    color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.02em; font-family: inherit;
    box-shadow: 0 4px 20px rgba(37,99,235,0.30);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.08); box-shadow: none;
    width: auto;
  }
  .step-label {
    font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  h1, h2 { font-weight: 800; }
  h1 { font-size: 28px; }
  h2 { font-size: 22px; margin: 0 0 6px; }
  .sub { font-size: 13px; color: rgba(255,255,255,0.55); margin: 0 0 24px; line-height: 1.7; }
  .section-card {
    cursor: pointer; display: flex; align-items: center; gap: 16px;
    padding: 20px; transition: all 0.2s ease;
  }
  .section-card.selected {
    border: 2px solid #2563EB; background: rgba(37,99,235,0.12);
  }
  .section-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }
  .section-card.selected .section-icon { background: rgba(37,99,235,0.18); }
  .checkbox {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .checkbox.checked { border: none; background: #2563EB; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .badge-section { background: rgba(37,99,235,0.15); color: #93C5FD; }
  .badge-sub { background: rgba(251,191,36,0.15); color: #FCD34D; }
  .progress-bar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #2563EB, #60A5FA);
    transition: width 0.28s ease;
  }
  .option-btn {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 15px 16px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; cursor: pointer;
    transition: all 0.2s ease; text-align: left; width: 100%;
    font-family: inherit; color: #F1F5F9;
  }
  .option-btn.selected { border: 2px solid #2563EB; background: rgba(37,99,235,0.14); }
  .option-marker {
    width: 26px; height: 26px; min-width: 26px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; font-size: 12px; font-weight: 800;
    color: rgba(255,255,255,0.88);
  }
  .option-btn.selected .option-marker {
    border-color: #60A5FA; background: #2563EB; color: #fff;
  }
  .helper-text { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 10px; line-height: 1.6; }
  input[type="text"] {
    width: 100%; padding: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: #fff; font-size: 16px;
    outline: none; font-family: inherit;
  }
  input[type="text"]:focus { border-color: #2563EB; }
  textarea {
    width: 100%; min-height: 132px; resize: vertical;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; color: #fff; font-size: 14px; line-height: 1.7;
    outline: none; font-family: inherit;
  }
  textarea:focus { border-color: #2563EB; }
  textarea::placeholder { color: rgba(255,255,255,0.34); }
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .info-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px; padding: 20px 18px;

  .info-card p, .info-card li { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.72); }
  .info-card ul { list-style: none; padding-left: 0; }
  .info-card li { position: relative; padding-left: 14px; word-break: keep-all; line-break: strict; }
  .info-card li::before { content: '•'; position: absolute; left: 0; color: #60A5FA; }
  .muted-note {
    padding: 14px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.72);
  }
  .accent-line {
    position: absolute; height: 3px; width: 140%; left: -20%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: rotate(-15deg);
    pointer-events: none;
  }
  .accent-line.top { top: 24%; }
  .accent-line.bottom { bottom: 28%; }
  .confirm-icon {
    width: 56px; height: 56px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
    background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.25);
  }
  .duplicate-icon {
    width: 72px; height: 72px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 20px;
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25);
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #60A5FA; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 420px) {
    .info-grid { grid-template-columns: 1fr; }
  }

/* ══════════════════════════════════════
   SCORING
   ══════════════════════════════════════ */
function gradeAnswers(roleId, answers) {
  const keys = ANSWER_KEYS[roleId];
  if (!keys) return { correct: 0, total: 0, score: 0, details: [] };
  const questions = flattenQuestions(roleId);
  let correct = 0;
  const details = [];
  questions.forEach(q => {
    const key = keys[q.id];
    const userAns = answers[q.id];
    let isCorrect = false;
    if (Array.isArray(key)) {
      if (Array.isArray(userAns)) {
        const sortedKey = [...key].sort();
        const sortedUser = [...userAns].sort();
        isCorrect = sortedKey.length === sortedUser.length && sortedKey.every((v, i) => v === sortedUser[i]);
      }
    } else {
      isCorrect = userAns === key;
    }
    if (isCorrect) correct++;
    details.push({ id: q.id, sectionTitle: q.sectionTitle, correct: isCorrect });
  });
  return { correct, total: questions.length, score: questions.length > 0 ? Math.round((correct / questions.length) * 100) : 0, details };
}

/* ══════════════════════════════════════
   STATE
   ══════════════════════════════════════ */
let state = {
  step: "welcome",
  role: "",
  name: "",
  questionIndex: 0,
  answers: {},
  qualitative: { inconvenience: "", issue: "" },
  duplicateInfo: null,
  isSubmitting: false
};

function getRole() { return ROLE_DATA[state.role] || null; }

function flattenQuestions(roleId) {
  if (roleId === undefined) roleId = state.role;
  const role = ROLE_DATA[roleId];
  if (!role) return [];
  const result = [];
  role.sections.forEach((section, sectionIdx) => {
    section.questions.forEach((q, qIdx) => {
      result.push({ ...q, sectionTitle: section.sectionTitle, subSection: section.subSection || "", sectionIdx, qIdx });
    });
  });
  return result;
}

function totalQuestions() { return flattenQuestions().length; }
function currentQuestion() { return flattenQuestions()[state.questionIndex]; }
function getAnswer(qid) { return state.answers[qid]; }

function isAnswered(q) {
  const a = getAnswer(q.id);
  return q.type === "multiple" ? Array.isArray(a) && a.length > 0 : typeof a === "string" && a.length > 0;
}

function progressPercent() {
  const total = totalQuestions();
  if (!total) return 0;
  return Math.round((state.questionIndex / total) * 100);
}

function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#039;");
}

/* ══════════════════════════════════════
   DUPLICATE CHECK (via Google Apps Script)
   ══════════════════════════════════════ */
async function checkDuplicate(name) {
  if (!GOOGLE_SCRIPT_URL) return null;
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL + "?action=checkDuplicate&name=" + encodeURIComponent(name.trim()));
    const data = await res.json();
    if (data && data.duplicate) return data;
    return null;
  } catch (e) {
    console.error("Duplicate check failed:", e);
    return null;
  }
}

    qualitative: renderQualitative,
    submitting: renderSubmitting,
    complete: renderComplete
  };
  const fn = renderers[state.step];
  if (fn) app.innerHTML = fn();
  window.scrollTo(0, 0);

  if (state.step === 'name') {
    setTimeout(() => {
      const inp = document.getElementById('nameInput');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }, 50);
  }
}

/* ══════════════════════════════════════
   ACTIONS
   ══════════════════════════════════════ */
function go(step) { state.step = step; render(); }
function selectRole(roleId) { state.role = roleId; render(); }

function onNameInput(val) {
  state.name = val;
  const btn = document.getElementById('startBtn');
  if (btn) btn.disabled = !val.trim();
}

async function goToConfirm() {
  if (!state.name.trim() || !state.role) return;
  const dup = await checkDuplicate(state.name.trim());
  if (dup) {
    state.duplicateInfo = dup;
    go('duplicate');
    return;
  }
  go('confirm');
}

function startSurvey() {
  if (!state.name.trim() || !state.role) return;
  state.questionIndex = 0;
  go('survey');
}

function toggleOption(qid, optionIdx) {
  const q = flattenQuestions().find(item => item.id === qid);
  if (!q) return;
  const option = q.options[optionIdx];
  if (q.type === 'single') {
    state.answers[qid] = option;
  } else {
    const current = Array.isArray(state.answers[qid]) ? [...state.answers[qid]] : [];
    const idx = current.indexOf(option);
    if (idx >= 0) current.splice(idx, 1);
    else current.push(option);
    state.answers[qid] = current;
  }
  render();
}

function nextQuestion() {
  const q = currentQuestion();
  if (!isAnswered(q)) return;
  if (state.questionIndex < totalQuestions() - 1) { state.questionIndex++; render(); }
  else { go('qualitative'); }
}

function prevQuestion() { if (state.questionIndex > 0) { state.questionIndex--; render(); } }
function updateQualitative(field, value) { state.qualitative[field] = value; }
function goBackToLastQuestion() { state.step = 'survey'; state.questionIndex = totalQuestions() - 1; render(); }

async function submitSurvey() {
  if (state.isSubmitting) return;
  state.isSubmitting = true;
  go('submitting');

  const result = gradeAnswers(state.role, state.answers);
  const payload = {
    timestamp: new Date().toISOString(),
    role: state.role,
    roleName: getRole().name,
    name: state.name.trim(),
    answers: state.answers,
    qualitative: state.qualitative,
    score: result.score,
    correct: result.correct,
    total: result.total,
    details: result.details
  };

  if (!GOOGLE_SCRIPT_URL) {
    console.log('Survey data (no Google Script URL configured):', JSON.stringify(payload, null, 2));
    state.isSubmitting = false;
    go('complete');
    return;
  }

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    state.isSubmitting = false;
    go('complete');
  } catch (e) {
    console.error(e);
    state.isSubmitting = false;
    alert('제출 중 오류가 발생했습니다. 다시 시도해주세요.');
    go('qualitative');
  }
}

function resetSurvey() {
  state = {
    step: 'welcome', role: '', name: '', questionIndex: 0,
    answers: {}, qualitative: { inconvenience: '', issue: '' },
    duplicateInfo: null, isSubmitting: false
  };
  render();
}

render();
</script>
